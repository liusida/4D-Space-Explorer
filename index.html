<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D–100D Rotation Explorer</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <a
    class="github-peel"
    href="https://github.com/liusida/4D-Space-Explorer"
    target="_blank"
    rel="noopener noreferrer"
    aria-label="View source on GitHub (4D-Space-Explorer)"
  >
    <span class="github-peel__label">GitHub</span>
  </a>
  <main class="layout">
    <section class="panel hero">
      <p class="eyebrow" id="heroEyebrow">Projection playground</p>
      <h1 id="heroTitle">Rotate a 2D viewing plane through 3D space.</h1>
      <p class="intro" id="heroIntro" hidden></p>
    </section>

    <section class="workspace" id="workspace" role="tabpanel" aria-labelledby="tab3d">
      <section class="panel viewer-panel">
        <div class="viewer-header">
          <div>
            <h2>Projection</h2>
          </div>
          <div class="viewer-header-right">
            <div class="projection-zoom-toolbar" role="group" aria-label="Projection zoom">
              <button
                type="button"
                id="projectionZoomOut"
                class="projection-zoom-button"
                aria-label="Zoom out projection"
                title="Zoom out"
              >
                −
              </button>
              <button
                type="button"
                id="projectionZoomReset"
                class="projection-zoom-button projection-zoom-button--reset"
                aria-label="Reset projection zoom"
                title="Reset zoom (1×)"
              >
                1×
              </button>
              <button
                type="button"
                id="projectionZoomIn"
                class="projection-zoom-button"
                aria-label="Zoom in projection"
                title="Zoom in"
              >
                +
              </button>
            </div>
            <div class="demo-tabs" role="tablist" aria-label="Choose dimension">
            <button
              type="button"
              class="demo-tab is-active"
              role="tab"
              id="tab3d"
              aria-selected="true"
              aria-controls="workspace"
              data-demo-mode="3"
            >
              3D
            </button>
            <button
              type="button"
              class="demo-tab"
              role="tab"
              id="tab4d"
              aria-selected="false"
              aria-controls="workspace"
              data-demo-mode="4"
            >
              4D
            </button>
            <button
              type="button"
              class="demo-tab"
              role="tab"
              id="tab10d"
              aria-selected="false"
              aria-controls="workspace"
              data-demo-mode="10"
            >
              10D
            </button>
            <button
              type="button"
              class="demo-tab"
              role="tab"
              id="tab100d"
              aria-selected="false"
              aria-controls="workspace"
              data-demo-mode="100"
            >
              100D
            </button>
            </div>
          </div>
        </div>
        <div class="canvas-stack" id="canvasStack">
          <div class="canvas-panel" id="primaryCanvasPanel">
            <p class="canvas-caption" id="primaryCanvasCaption">View plane (u, v)</p>
            <div class="canvas-wrap" id="primaryCanvasWrap">
              <canvas id="projectionCanvas" aria-label="Main projection (u, v)"></canvas>
            </div>
          </div>
        </div>
      </section>

      <aside class="sidebar">
        <section class="panel controls-panel">
          <div class="controls-panel-head">
            <h2 id="controlsHeading">Rotate in 3D planes</h2>
            <div class="controls-panel-actions">
              <button
                id="resetButton"
                class="reset-icon-button"
                type="button"
                aria-label="Reset view"
                title="Reset view"
              >
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                  <polyline points="9 22 9 12 15 12 15 22" />
                </svg>
              </button>
              <button
                id="randomViewButton"
                class="reset-icon-button"
                type="button"
                aria-label="Random view"
                title="Random view plane (time-seeded). On Random cloud, also draws a new point sample."
              >
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <rect x="3" y="3" width="18" height="18" rx="3" ry="3" />
                  <circle cx="8.5" cy="8.5" r="1.25" fill="currentColor" stroke="none" />
                  <circle cx="15.5" cy="15.5" r="1.25" fill="currentColor" stroke="none" />
                  <circle cx="12" cy="12" r="1.25" fill="currentColor" stroke="none" />
                </svg>
              </button>
              <button
                id="pcaViewButton"
                class="reset-icon-button"
                type="button"
                aria-label="PCA view from three random points (origin excluded)"
                title="Pick three random non-origin scene points, run PCA on them, and align the view plane so they spread out (first two principal components)."
              >
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <circle cx="7" cy="16" r="1.6" fill="currentColor" stroke="none" />
                  <circle cx="17" cy="15" r="1.6" fill="currentColor" stroke="none" />
                  <circle cx="12" cy="7" r="1.6" fill="currentColor" stroke="none" />
                  <path d="M7 16 L12 7 L17 15 Z" stroke="currentColor" fill="none" />
                </svg>
              </button>
            </div>
          </div>
          <p class="pca-triple-readout" id="pcaTripleReadout" hidden></p>
          <p class="controls-copy" id="controlsCopy" hidden></p>
          <div class="scene-tabs" role="tablist" aria-label="Points to project">
            <button
              type="button"
              class="scene-tab is-active"
              role="tab"
              id="tabSceneAxes"
              aria-selected="true"
              data-scene-mode="axes"
            >
              Unit axes
            </button>
            <button
              type="button"
              class="scene-tab"
              role="tab"
              id="tabSceneCube"
              aria-selected="false"
              data-scene-mode="cube"
            >
              Hypercube
            </button>
            <button
              type="button"
              class="scene-tab"
              role="tab"
              id="tabSceneCloud"
              aria-selected="false"
              data-scene-mode="cloud"
            >
              Random cloud
            </button>
          </div>
          <div class="visual-toggle-stack">
            <div class="edge-toggle-row">
              <span class="edge-toggle-label" id="edgeToggleLabel">Wireframe edges</span>
              <button
                type="button"
                id="edgeToggle"
                class="edge-switch is-on"
                role="switch"
                aria-checked="true"
                aria-labelledby="edgeToggleLabel"
              >
                <span class="edge-switch-knob" aria-hidden="true"></span>
              </button>
            </div>
            <div class="edge-toggle-row">
              <span class="edge-toggle-label" id="axisHintToggleLabel">Rotation plane hint</span>
              <button
                type="button"
                id="axisHintToggle"
                class="edge-switch"
                role="switch"
                aria-checked="false"
                aria-labelledby="axisHintToggleLabel"
              >
                <span class="edge-switch-knob" aria-hidden="true"></span>
              </button>
            </div>
            <div class="edge-toggle-row">
              <span class="edge-toggle-label" id="coordsToggleLabel">Projection coordinates</span>
              <button
                type="button"
                id="coordsToggle"
                class="edge-switch"
                role="switch"
                aria-checked="false"
                aria-labelledby="coordsToggleLabel"
                title="Show (x, y, depth) next to each label: depth is signed along n in 3D, ‖⊥‖ in the normal space in 4D+."
              >
                <span class="edge-switch-knob" aria-hidden="true"></span>
              </button>
            </div>
          </div>
          <div id="knobGrid" class="knob-grid"></div>
        </section>

        <section class="panel status-panel">
          <h2>View plane (u, v)</h2>
          <div class="status-block">
            <span class="status-label">u</span>
            <code id="uVector"></code>
          </div>
          <div class="status-block">
            <span class="status-label">v</span>
            <code id="vVector"></code>
          </div>
          <div class="status-block">
            <span class="status-label">angles</span>
            <code id="angleState" class="angles-readout"></code>
          </div>
          <details class="legend-disclosure">
            <summary class="legend-summary" id="legendSummary">Axis definitions</summary>
            <div class="legend" id="legend"></div>
          </details>
        </section>
      </aside>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
